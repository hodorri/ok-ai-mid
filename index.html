<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Engineer 2기 결과물 제출</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ok-orange: #E8431A;
    --ok-dark: #4A3B30;
    --bg: #F7F5F2;
    --surface: #FFFFFF;
    --surface-2: #F2EFEb;
    --text: #1A1714;
    --text-2: #6B625A;
    --text-3: #9E9590;
    --border: rgba(74,59,48,0.12);
    --border-2: rgba(74,59,48,0.22);
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .page-header {
    background: var(--ok-dark);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    height: 56px;
    gap: 10px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    background: var(--ok-orange);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark span {
    font-size: 11px;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.02em;
  }

  .header-title {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.02em;
  }

  .main {
    max-width: 640px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
  }

  .hero {
    margin-bottom: 2.5rem;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ok-orange);
    background: rgba(232,67,26,0.08);
    padding: 5px 10px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .hero-badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--ok-orange);
    animation: blink 1.8s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .hero h1 {
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 32px;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 12px;
    color: var(--text);
  }

  .hero h1 em {
    font-style: normal;
    color: var(--ok-orange);
  }

  .deadline-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-2);
    margin-top: 14px;
    padding: 10px 14px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    border-left: 3px solid var(--ok-orange);
  }

  .deadline-row strong { color: var(--ok-orange); font-weight: 500; }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .card-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 1.125rem;
    padding-bottom: 0.875rem;
    border-bottom: 0.5px solid var(--border);
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field + .field { margin-top: 12px; }
  .grid-2 .field + .field { margin-top: 0; }

  label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-2);
  }

  .req { color: var(--ok-orange); margin-left: 2px; }

  input[type="text"], textarea {
    width: 100%;
    padding: 9px 12px;
    font-size: 14px;
    font-family: 'Nanum Gothic', sans-serif;
    border: 0.5px solid var(--border-2);
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
  }

  input[type="text"]::placeholder, textarea::placeholder {
    color: var(--text-3);
    font-weight: 300;
  }

  input[type="text"]:focus, textarea:focus {
    border-color: var(--ok-orange);
    box-shadow: 0 0 0 3px rgba(232,67,26,0.10);
    background: #fff;
  }

  textarea {
    resize: vertical;
    min-height: 90px;
    line-height: 1.65;
  }

  .upload-zone {
    border: 1.5px dashed var(--border-2);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--surface-2);
    position: relative;
  }

  .upload-zone:hover { border-color: var(--ok-orange); background: rgba(232,67,26,0.02); }
  .upload-zone.active { border-color: var(--ok-orange); background: rgba(232,67,26,0.04); }

  .upload-zone.has-file {
    border-color: #3B6D11;
    background: rgba(59,109,17,0.04);
    border-style: solid;
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon-wrap {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(232,67,26,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 10px;
    transition: background 0.15s;
  }

  .has-file .upload-icon-wrap { background: rgba(59,109,17,0.1); }

  .upload-icon {
    width: 20px;
    height: 20px;
    color: var(--ok-orange);
  }

  .has-file .upload-icon { color: #3B6D11; }

  .upload-text-main {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .upload-text-sub {
    font-size: 12px;
    color: var(--text-3);
  }

  .file-info {
    display: none;
    margin-top: 8px;
    font-size: 12px;
    font-weight: 500;
    color: #3B6D11;
    background: rgba(59,109,17,0.06);
    padding: 5px 10px;
    border-radius: 6px;
    display: inline-block;
  }

  .notice-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .notice-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(232,67,26,0.08);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }

  .notice-content {}

  .notice-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 5px;
  }

  .notice-body {
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.65;
  }

  .notice-body a {
    color: var(--ok-orange);
    text-decoration: none;
    font-weight: 500;
  }

  .notice-body a:hover { text-decoration: underline; }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: var(--ok-orange);
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    font-family: 'Nanum Gothic', sans-serif;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.01em;
  }

  .submit-btn:hover { background: #c93614; }
  .submit-btn:active { transform: scale(0.995); }

  .submit-btn:disabled {
    background: var(--text-3);
    cursor: not-allowed;
    transform: none;
  }

  .status {
    display: none;
    margin-top: 1rem;
    padding: 14px 16px;
    border-radius: var(--radius);
    font-size: 13.5px;
    line-height: 1.7;
  }

  .status.loading {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface-2);
    color: var(--text-2);
    border: 0.5px solid var(--border);
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border-2);
    border-top-color: var(--ok-orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status.success {
    display: block;
    background: rgba(59,109,17,0.06);
    color: #2d5510;
    border: 0.5px solid rgba(59,109,17,0.2);
  }

  .status.error {
    display: block;
    background: rgba(232,67,26,0.05);
    color: #a82e10;
    border: 0.5px solid rgba(232,67,26,0.2);
  }

  @media (max-width: 480px) {
    .grid-2 { grid-template-columns: 1fr; }
    .hero h1 { font-size: 28px; }
  }
</style>
</head>
<body>

<header class="page-header">
  <div class="logo-mark"><span>OK</span></div>
  <span class="header-title">AI Engineer 2기 · 인재개발팀</span>
</header>

<main class="main">
  <div class="hero">
    <div class="hero-badge">결과물 제출</div>
    <h1>AI Engineer <em>2기</em><br>결과물 제출</h1>
    <div class="deadline-row">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="6.5" stroke="#E8431A" stroke-width="1.3"/>
        <path d="M8 4.5V8.5L10.5 10.5" stroke="#E8431A" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      제출 마감: <strong>2025년 3월 17일(화) 오후 6시</strong>
    </div>
  </div>

  <!-- 참가자 정보 -->
  <div class="card">
    <div class="card-label">참가자 정보</div>
    <div class="grid-2">
      <div class="field">
        <label>이름 <span class="req">*</span></label>
        <input type="text" id="name" placeholder="홍길동">
      </div>
      <div class="field">
        <label>직급 <span class="req">*</span></label>
        <input type="text" id="rank" placeholder="예: 사원, 대리, 과장">
      </div>
    </div>
    <div class="grid-2">
      <div class="field">
        <label>회사 <span class="req">*</span></label>
        <input type="text" id="company" placeholder="예: OK저축은행, OK캐피탈">
      </div>
      <div class="field">
        <label>소속 팀 <span class="req">*</span></label>
        <input type="text" id="dept" placeholder="예: 인재개발팀, 디지털혁신팀">
      </div>
    </div>
  </div>

  <!-- AI Agent 정보 -->
  <div class="card">
    <div class="card-label">AI Agent 결과물</div>
    <div class="field">
      <label>AI Agent 주제 <span class="req">*</span></label>
      <input type="text" id="topic" placeholder="개발한 AI Agent의 제목 또는 주제를 입력해주세요">
    </div>
    <div class="field">
      <label>개발 배경 <span class="req">*</span></label>
      <textarea id="background" placeholder="어떤 문제를 해결하기 위해 개발했나요? 업무 또는 생활 속의 배경을 자유롭게 써주세요."></textarea>
    </div>
    <div class="field">
      <label>기대효과 <span class="req">*</span></label>
      <textarea id="effect" placeholder="이 Agent를 통해 기대되는 효과나 변화, 활용 방안을 써주세요."></textarea>
    </div>
  </div>

  <!-- 파일 첨부 -->
  <div class="card">
    <div class="card-label">파일 첨부</div>
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon-wrap">
        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="upload-text-main" id="uploadMain">.md 파일을 첨부해주세요</div>
      <div class="upload-text-sub" id="uploadSub">클릭하거나 파일을 끌어다 놓으세요</div>
      <span class="file-info" id="fileInfo" style="display:none"></span>
    </div>
    <input type="file" id="fileInput" accept=".md" style="display:none" aria-label="md 파일 선택">
  </div>

  <!-- 영수증 안내 -->
  <div class="notice-card">
    <div class="notice-icon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="1.5" width="12" height="13" rx="2" stroke="#E8431A" stroke-width="1.2"/>
        <path d="M5 5.5h6M5 8h6M5 10.5h4" stroke="#E8431A" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="notice-content">
      <div class="notice-title">Claude 구독료 매출전표 미제출자 안내</div>
      <div class="notice-body">
        아직 Claude 구독료 매출전표를 제출하지 않으신 분은<br>
        아래 이메일로 보내주시기 바랍니다.<br>
        <a href="mailto:okhrd@okfngroup.com">okhrd@okfngroup.com</a>
      </div>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn">결과물 제출하기</button>
  <div class="status" id="status"></div>
</main>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwPwTAoiv86vRgCGP1h-ZATCb6j1TFg649sS-FqncR8j1zpkUw09ycLrWOlm5za_ef1ZA/exec';

const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');
const fileInfo = document.getElementById('fileInfo');
const uploadMain = document.getElementById('uploadMain');
const uploadSub = document.getElementById('uploadSub');
let selectedFile = null;

// 업로드 존 클릭 → 파일 선택창 열기
uploadZone.addEventListener('click', () => fileInput.click());

function setFileUI(file) {
  selectedFile = file;
  uploadZone.classList.add('has-file');
  uploadMain.textContent = '파일이 선택되었습니다';
  uploadSub.textContent = '';
  fileInfo.style.display = 'inline-block';
  fileInfo.textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
}

fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) setFileUI(e.target.files[0]);
});

uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('active');
});

uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('active'));

uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('active');
  const f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.md')) setFileUI(f);
  else alert('.md 파일만 첨부 가능합니다.');
});

function setStatus(type, html) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  if (type === 'loading') {
    el.innerHTML = '<div class="spinner"></div><span>' + html + '</span>';
  } else {
    el.innerHTML = html;
  }
}

async function submitForm() {
  const name = document.getElementById('name').value.trim();
  const company = document.getElementById('company').value.trim();
  const dept = document.getElementById('dept').value.trim();
  const rank = document.getElementById('rank').value.trim();
  const topic = document.getElementById('topic').value.trim();
  const background = document.getElementById('background').value.trim();
  const effect = document.getElementById('effect').value.trim();

  if (!name || !company || !dept || !rank || !topic || !background || !effect) {
    setStatus('error', '모든 필수 항목(*)을 입력해주세요.');
    return;
  }
  if (!selectedFile) {
    setStatus('error', '.md 파일을 첨부해주세요.');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  setStatus('loading', '제출 중입니다. 잠시만 기다려주세요...');

  try {
    const mdContent = await selectedFile.text();
    const payload = { name, company, dept, rank, topic, background, effect, fileName: selectedFile.name, mdContent };

    const resp = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const result = await resp.json();

    if (result.success) {
      const now = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
      setStatus('success',
        `✓ 제출이 완료되었습니다!<br><br>
        <strong>${name}</strong>님의 <strong>${topic}</strong> 결과물이<br>
        드라이브에 성공적으로 업로드되었습니다.<br><br>
        <span style="font-size:12px;opacity:0.75;">제출 시각: ${now}</span>`
      );
      btn.textContent = '제출 완료 ✓';
      btn.style.background = '#3B6D11';
    } else {
      throw new Error(result.message || '업로드에 실패했습니다.');
    }
  } catch(err) {
    setStatus('error', '오류가 발생했습니다: ' + err.message);
    document.getElementById('submitBtn').disabled = false;
  }
}

// 제출 버튼 이벤트 (onclick 대신 addEventListener 사용)
document.getElementById('submitBtn').addEventListener('click', submitForm);
</script>
</body>
</html>
